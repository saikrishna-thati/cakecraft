<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB923C" />
      <stop offset="100%" stop-color="#EA580C" />
    </linearGradient>

    <!-- Frosting Gradient -->
    <linearGradient id="frostingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#FFF7ED" />
    </linearGradient>

    <!-- Cake Base Gradient -->
    <linearGradient id="cakeGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b4513" />
      <stop offset="100%" stop-color="#d2691e" />
    </linearGradient>

    <!-- Shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="800" rx="160" fill="url(#bgGrad)" />

  <g transform="translate(0, -40)" filter="url(#shadow)">
    <!-- Plate -->
    <ellipse cx="400" cy="520" rx="220" ry="40" fill="#f8f9fa" />
    <ellipse cx="400" cy="530" rx="220" ry="40" fill="#dee2e6" />

    <!-- Cake Base -->
    <path d="M 240 400 L 240 500 Q 400 560 560 500 L 560 400 Z" fill="url(#cakeGrad)" />

    <!-- Cake Layer Line -->
    <path d="M 240 450 Q 400 510 560 450" fill="none" stroke="#FFF7ED" stroke-width="15" stroke-linecap="round" />

    <!-- Frosting Overhangs -->
    <path d="M 230 400 C 230 430, 270 450, 290 420 C 310 460, 350 450, 360 410 C 380 440, 420 440, 440 410 C 460 450, 500 460, 520 420 C 540 450, 570 430, 570 400 Z" fill="url(#frostingGrad)" />
    
    <!-- Top Frosting Flat -->
    <ellipse cx="400" cy="380" rx="170" ry="45" fill="url(#frostingGrad)" />

    <!-- Cherries/Decorations -->
    <circle cx="300" cy="360" r="15" fill="#dc3545" />
    <circle cx="400" cy="340" r="18" fill="#dc3545" />
    <circle cx="500" cy="360" r="15" fill="#dc3545" />

    <!-- Flame / Candle -->
    <rect x="390" y="240" width="20" height="90" rx="5" fill="#f1c40f" />
    <!-- Candle stripes -->
    <path d="M 390 250 L 410 270 M 390 280 L 410 300 M 390 310 L 410 330" stroke="#e74c3c" stroke-width="4" />
    
    <!-- Flame -->
    <path d="M 400 180 C 420 210, 415 230, 400 235 C 385 230, 380 210, 400 180 Z" fill="#ff9f43" />
    <path d="M 400 195 C 410 215, 408 225, 400 230 C 392 225, 390 215, 400 195 Z" fill="#ee5253" />
  </g>

  <!-- Typography -->
  <text x="400" y="660" font-family="'Poppins', 'Montserrat', 'Segoe UI', sans-serif" font-size="76" font-weight="800" fill="#ffffff" text-anchor="middle" filter="url(#textShadow)" letter-spacing="4">CAKECRAFT</text>
  
  <text x="400" y="700" font-family="'Inter', 'Segoe UI', sans-serif" font-size="24" font-weight="600" fill="#FFF7ED" text-anchor="middle" letter-spacing="8" opacity="0.9">PREMIUM BAKES</text>

  <!-- Decorative swoosh -->
  <path d="M 250 730 Q 400 760 550 730" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.7" />

</svg>
